index.html<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سر خاص 💙</title>

<style>
body {
  margin:0;
  font-family: sans-serif;
  background: linear-gradient(135deg,#0a1f44,#1565c0);
  color:white;
  text-align:center;
  overflow:hidden;
}

/* شاشة القفل */
#lockScreen {
  margin-top:150px;
}

input {
  padding:10px;
  font-size:18px;
  border-radius:8px;
  border:none;
}

button {
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#2196f3;
  color:white;
  cursor:pointer;
  margin:10px;
  transition:0.3s;
}

button:hover {
  background:#64b5f6;
  transform:scale(1.1);
}

/* المحتوى */
#main {
  display:none;
  padding:20px;
}

.character {
  font-size:80px;
  animation: float 3s infinite ease-in-out;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

#text {
  margin-top:20px;
  font-size:22px;
  min-height:60px;
}

/* قلوب */
.heart {
  position:absolute;
  color:#64b5f6;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0%{transform:translateY(100vh); opacity:1;}
  100%{transform:translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<!-- شاشة كلمة السر -->
<div id="lockScreen">
<h1>🔐 هدية سرية</h1>
<p>اكتبي كلمة السر 💙</p>
<input type="password" id="pass">
<br>
<button onclick="checkPass()">فتح</button>
<p id="error"></p>
</div>

<!-- المحتوى -->
<div id="main">

<div class="character">👸💙</div>
<h2>مرحباً فرح…</h2>

<p id="text">اضغطي حتى تسمعين قلبي شنو يريد يحچي 💙</p>

<button onclick="next()">✨ التالي</button>
<button onclick="hearts()">💙 مفاجأة</button>

</div>

<script>
function checkPass(){
  let p = document.getElementById("pass").value;
  if(p === "فروحاتي"){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("main").style.display="block";
  } else {
    document.getElementById("error").innerHTML="❌ كلمة السر غلط";
  }
}

let messages = [
"ما عُدتُ أَرى الدُّنيا كما كانت،<br>مُنذُ أن صارت عَيناكِ طريقي.",
"أُحِبُّكِ حُبًّا لو تَجَسَّدَ نُورًا<br>لأضاءَ العالَمَ، وما أبقى لِلعَتمةِ مَأوى.",
"فرح… انتي مو مجرد شخص بحياتي، انتي الحياة نفسها.",
"كل شي قبلج كان عادي… وبعدج صار كلشي إله معنى.",
"أحبج بطريقة تخوف… لأن ما أتصور حياتي بدونج.",
"وإذا الدنيا كلها ضدي… وجودج وحده يكفيني 💙",
"انتي مو بس حلم… انتي الشي الوحيد اللي ما أريد أصحى منه.",
"وأعدج أبقى أحبج بنفس القوة… وأكثر كل يوم."
];

let i = 0;

function next(){
  if(i < messages.length){
    document.getElementById("text").innerHTML = messages[i];
    i++;
  } else {
    document.getElementById("text").innerHTML = "💌 انتهت الكلمات… بس الحب بعده مستمر";
  }
}

function hearts(){
  for(let i=0;i<40;i++){
    let h = document.createElement("div");
    h.innerHTML="💙";
    h.className="heart";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*20+10)+"px";
    h.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(h);
    setTimeout(()=>{h.remove();},5000);
  }
}
</script>

</body>
</html>
