<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>هدية لأمي 💛</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    font-family:'Tajawal', sans-serif;
    background: linear-gradient(135deg,#FDFBF7,#ffffff);
    overflow-x:hidden;
}

/* انتقالات */
.section{
    opacity:0;
    transform:translateY(40px);
    transition: all 1s ease;
}
.section.show{
    opacity:1;
    transform:translateY(0);
}

/* زر نابض */
.pulse{
    animation:pulse 2s infinite;
}
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

/* كتابة */
.typewriter{
    border-right:3px solid gold;
    white-space:nowrap;
    overflow:hidden;
}

/* ورود */
.petal{
    position:fixed;
    top:-10px;
    width:10px;
    height:10px;
    background:rgba(255,182,193,0.6);
    border-radius:50%;
    animation:fall linear infinite;
}
@keyframes fall{
    to{
        transform:translateY(100vh);
        opacity:0;
    }
}

/* هدايا */
.gift{
    cursor:pointer;
    transition:.3s;
}
.gift:hover{
    transform:scale(1.1);
}
</style>
</head>

<body class="text-gray-800">

<!-- موسيقى (تقدر تغير الرابط) -->
<audio autoplay loop>
<source src="" type="audio/mpeg">
</audio>

<!-- ورود -->
<script>
for(let i=0;i<20;i++){
    let petal=document.createElement("div");
    petal.className="petal";
    petal.style.left=Math.random()*100+"%";
    petal.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(petal);
}
</script>

<!-- القسم 1 -->
<section class="section h-screen flex flex-col justify-center items-center text-center px-6">
    <h1 class="text-2xl md:text-4xl font-bold mb-6 text-yellow-700">
        إلى منبع الطهر، ونور عيوني.. إلى أمي الغالية التفات
    </h1>

    <button onclick="nextSection()" class="pulse bg-yellow-600 text-white px-6 py-3 rounded-full shadow-lg">
        اضغطي يا جنّتي لفتح الرسالة
    </button>
</section>

<!-- القسم 2 -->
<section class="section min-h-screen flex flex-col justify-center items-center text-center px-6">
    <h2 class="text-3xl font-bold text-yellow-700 mb-6">
        امرأةٌ عظيمة، صابرة، ومجاهدة
    </h2>

    <p id="type1" class="max-w-xl leading-loose text-lg"></p>

    <p class="mt-6 italic text-gray-600">
        "الأُمُّ مَدرَسَةٌ إِذا أَعدَدتَها.. أَعدَدتَ شَعباً طَيِّبَ الأَعراقِ"
    </p>
</section>

<!-- القسم 3 -->
<section class="section min-h-screen flex flex-col justify-center items-center text-center px-6">
    <h2 class="text-3xl font-bold text-yellow-700 mb-6">
        رسالة من ابنكِ البار
    </h2>

    <p id="type2" class="max-w-xl leading-loose text-lg"></p>
</section>

<!-- القسم 4 -->
<section class="section min-h-screen flex flex-col justify-center items-center text-center px-6">
    <h2 class="text-3xl font-bold text-yellow-700 mb-10">
        هدايا لروحكِ الطيبة
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

        <div class="gift bg-white p-6 rounded-xl shadow" onclick="showGift(this,'اللهم أطل في عمر التفات وارزقها الفرح الذي لا ينتهي')">
            🎁
        </div>

        <div class="gift bg-white p-6 rounded-xl shadow" onclick="showGift(this,'قبلة على الرأس... شكراً لكل لحظة سهرتِ فيها لأجلي')">
            💋
        </div>

        <div class="gift bg-white p-6 rounded-xl shadow" onclick="showGift(this,'سأبقى دائماً تحت قدميكِ طالباً للرضا')">
            🤍
        </div>

    </div>
</section>

<!-- القسم 5 -->
<section class="section h-screen flex flex-col justify-center items-center text-center px-6">
    <h2 class="text-2xl text-yellow-700">
        دُمتِ لي نوراً لا ينطفئ
    </h2>

    <p class="mt-4">
        ابنكِ المحب: حسين
    </p>
</section>

<script>
let sections=document.querySelectorAll(".section");

function showSections(){
    sections.forEach((sec,i)=>{
        setTimeout(()=>{
            sec.classList.add("show");
        },i*600);
    });
}
showSections();

/* زر البداية */
function nextSection(){
    window.scrollBy({top:window.innerHeight,behavior:'smooth'});
}

/* Typewriter */
function typeText(id,text,speed=40){
    let i=0;
    let el=document.getElementById(id);
    function typing(){
        if(i<text.length){
            el.innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,speed);
        }
    }
    typing();
}

typeText("type1","أمي الغالية (التفات)، أنتِ لستِ فقط أماً، بل أنتِ مدرسة في الصبر والقوة. عفتكِ، طهر قلبكِ، وجهادكِ في هذه الحياة جعل منكِ أيقونة للفخر. أنتِ القوية التي لم تكسرها الظروف، ونسأل الله أن يجبر خاطركِ جبراً يتعجب منه أهل السماء والأرض، وأن يأخذ حقكِ من كل من ظلمكِ.");

typeText("type2","ابنكِ حسين يحب يكلج: أنتِ أعظم انتصاراتي في هذه الحياة. شكراً على تربيتكِ الصالحة، وعلى أخلاقكِ العالية التي زرعتها فينا. أحبكِ وأحترمكِ بقدر هذا الكون، وأراكِ دائماً التاج الذي يزين رأسي. ربي يوفقكِ ويحفظكِ لي يا نور عيني.");

/* الهدايا */
function showGift(el,text){
    el.innerHTML="<p>"+text+"</p>";
}
</script>

</body>
</html>
