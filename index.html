<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إيمان 💙</title>
<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}

.box{
max-width:600px;
}

h1{
color:#7fd3ff;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#7fd3ff;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box" id="box">
<h1>إلى خالتي إيمان 💙</h1>
<p id="text">اضغط للبدء</p>
<button onclick="next()">ابدأ</button>
</div>

<script>

let step = 0;

function next(){

step++;
let box = document.getElementById("box");

if(step==1){
box.innerHTML = `
<h1>امرأة عظيمة</h1>
<p>إنتِ مو مجرد إنسانة… إنتِ قوة وصبر وطيبة.</p>
<button onclick="next()">التالي</button>
`;
}

else if(step==2){
box.innerHTML = `
<h1>تربيتك</h1>
<p>فرح انعكاس مباشر لقلبك النظيف وتربيتك الجميلة.</p>
<button onclick="next()">التالي</button>
`;
}

else if(step==3){
box.innerHTML = `
<h1>مكانتك</h1>
<p>أحبج مثل أمي وأحترمج من قلبي 💙</p>
<button onclick="next()">التالي</button>
`;
}

else{
box.innerHTML = `
<h1>💙</h1>
<p>هذا حسين يكلج: إنتِ نعمة كبيرة بحياتنا.</p>
`;
}

}

</script>

</body>
</html>
