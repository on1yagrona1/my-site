<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إيمان 💙</title>
<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.box{
max-width:700px;
padding:20px;
animation:fade 2s ease-in-out;
}

h1{
color:#7fd3ff;
text-shadow:0 0 20px #7fd3ff;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:15px;
background:#7fd3ff;
cursor:pointer;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="box" id="box">
<h1>إلى خالتي إيمان 💙</h1>
<p id="text">اضغط حتى تبدي الرسالة</p>
<button onclick="next()">ابدأ</button>
</div>

<script>
let step = 0;

function next(){
step++;

let box = document.getElementById("box");

if(step==1){
box.innerHTML = `
<h1>امرأة عظيمة</h1>
<p>أنتِ مو مجرد خالة… أنتِ قوة وصبر وطيبة ما تنوصف.</p>
<button onclick="next()">التالي</button>
`;
}

else if(step==2){
box.innerHTML = `
<h1>تربيتك</h1>
<p>فرح انعكاس لجمال قلبك وتربيتك الطيبة.</p>
<button onclick="next()">التالي</button>
`;
}

else if(step==3){
box.innerHTML = `
<h1>مكانتك</h1>
<p>أحبج مثل أمي وأحترمج من قلبي.</p>
<button onclick="next()">التالي</button>
`;
}

else{
box.innerHTML = `
<h1>💙</h1>
<p>هذا حسين يحب يكلج: إنتِ نعمة كبيرة بحياتنا.</p>
`;
}
}
</script>

</body>
</html>
